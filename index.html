<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="단련">
<meta name="theme-color" content="#f0f7f0">
<title>단련</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#f0f7f0;overflow:hidden;height:100%;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:#1a2e1a}
button,input,select{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const{useState,useEffect,useMemo,useCallback}=React;

/*═══════════════════════════════════════
  CONSTANTS
═══════════════════════════════════════*/
const START=new Date(2026,3,18);const END=new Date(2026,11,31);
const TARGET={p:80,u:20};const INIT={p:30,u:10};
const GOAL_5K=30;const GOAL_10K=55;

const BASE_PLAN={
  4:{max:{p:30,u:10},set:{p:15,u:6},sets:4,phase:"적응기",days:13},
  5:{max:{p:34,u:11},set:{p:17,u:7},sets:4,phase:"적응기",days:31},
  6:{max:{p:38,u:12},set:{p:20,u:7},sets:5,phase:"기초 축적",days:30},
  7:{max:{p:43,u:13},set:{p:22,u:8},sets:5,phase:"기초 축적",days:31},
  8:{max:{p:48,u:14},set:{p:25,u:8},sets:5,phase:"볼륨 확장",days:31},
  9:{max:{p:54,u:16},set:{p:28,u:10},sets:6,phase:"볼륨 확장",days:30},
  10:{max:{p:60,u:17},set:{p:31,u:10},sets:6,phase:"강화기",days:31},
  11:{max:{p:70,u:18},set:{p:36,u:11},sets:6,phase:"강화기",days:30},
  12:{max:{p:80,u:20},set:{p:42,u:12},sets:7,phase:"피크",days:31},
};

const TEST_SCHEDULE=[
  {date:"2026-05-16",target:{p:34,u:11}},{date:"2026-06-13",target:{p:38,u:12}},
  {date:"2026-07-11",target:{p:43,u:13}},{date:"2026-08-08",target:{p:48,u:14}},
  {date:"2026-09-05",target:{p:54,u:16}},{date:"2026-10-03",target:{p:60,u:17}},
  {date:"2026-10-31",target:{p:70,u:18}},{date:"2026-11-28",target:{p:70,u:18}},
  {date:"2026-12-26",target:{p:80,u:20}},
];

// 러닝 인터벌 플랜
const INTV_PLAN={
  5:{reps:"200m×6",pace:"4:40",desc:"스피드 감각"},
  6:{reps:"400m×5",pace:"4:50",desc:"기초 스피드"},
  7:{reps:"400m×6",pace:"4:45",desc:"볼륨 증가"},
  8:{reps:"600m×5",pace:"4:55",desc:"중거리 진입"},
  9:{reps:"800m×4",pace:"5:00",desc:"VO2max"},
  10:{reps:"1000m×4",pace:"5:05",desc:"레이스 페이스"},
  11:{reps:"1000m×5",pace:"5:10",desc:"볼륨 피크"},
  12:{reps:"1200m×4",pace:"5:15",desc:"최종 다듬기"},
};

// 공휴일
const HOLIDAYS=new Set(["2026-01-01","2026-01-29","2026-01-30","2026-01-31","2026-03-01","2026-05-05","2026-05-24","2026-06-06","2026-08-15","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-09","2026-12-25"]);

/*═══════════════════════════════════════
  HELPERS
═══════════════════════════════════════*/
const ymd=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr=()=>ymd(new Date());
const daysBetween=(a,b)=>Math.round((b-a)/86400000);
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const dayNames=["일","월","화","수","목","금","토"];
const isHoliday=ds=>HOLIDAYS.has(ds);
const getDayRate=date=>{const d=new Date(date);const wd=d.getDay();const ds=ymd(d);
  if(wd===6)return{rate:0.25,label:"토 25%"};if(wd===0)return{rate:0.5,label:"일 50%"};
  if(isHoliday(ds))return{rate:0.5,label:"공휴일 50%"};return{rate:1,label:""};};
const getWeekMon=d=>{const x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return new Date(x.getFullYear(),x.getMonth(),x.getDate())};

// Storage keys (기존 유지)
const K_LOG="gtg-v4-logs",K_TST="gtg-v4-tests",K_RUN="rk2-runs",K_RTST="rk2-tests";
const load=k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

const emptyLog=()=>({p:0,u:0,plank:false,yoga:0,med:0,nf:false,read:0,write:false,lang:0});
const getLog=(logs,ds)=>{const l=logs[ds];if(!l)return emptyLog();const o={...emptyLog(),...l};if(o.yoga===true)o.yoga=1;if(o.yoga===false)o.yoga=0;return o};

function getActivePlan(month,tests){
  const base=BASE_PLAN[month]||BASE_PLAN[4];
  const sorted=Object.entries(tests).filter(([d])=>{const dm=new Date(d).getMonth()+1;return dm<month||(dm===month&&new Date(d).getDate()<=15)}).sort(([a],[b])=>a.localeCompare(b));
  if(!sorted.length)return{...base,adjusted:false,reason:null};
  const[td,r]=sorted[sorted.length-1];const aP=r.p||INIT.p,aU=r.u||INIT.u;
  const ti=TEST_SCHEDULE.find(t=>t.date===td);
  const tP=ti?ti.target.p:base.max.p,tU=ti?ti.target.u:base.max.u;
  const bP=aP<tP,bU=aU<tU,behind=bP||bU;
  const adjSP=Math.max(Math.round(aP*0.55),10),adjSU=Math.max(Math.round(aU*0.55),5);
  const adjSets=behind?Math.min(base.sets+1,8):base.sets;
  const reason=behind?`${td.slice(5)} 미달 → 세트 ${base.sets}→${adjSets}`:`${td.slice(5)} 통과`;
  return{...base,set:{p:adjSP,u:adjSU},sets:adjSets,adjusted:true,behind,reason};
}

/*═══════════════════════════════════════
  APP
═══════════════════════════════════════*/
function App(){
  const[logs,setLogs]=useState(()=>load(K_LOG)||{});
  const[tests,setTests]=useState(()=>load(K_TST)||{});
  const[runs,setRuns]=useState(()=>load(K_RUN)||{});
  const[rTests,setRTests]=useState(()=>load(K_RTST)||[]);
  const[view,setView]=useState("today");
  const[activeDate,setActiveDate]=useState(todayStr());
  const[calMonth,setCalMonth]=useState(()=>new Date(new Date().getFullYear(),new Date().getMonth(),1));

  useEffect(()=>{sv(K_LOG,logs)},[logs]);
  useEffect(()=>{sv(K_TST,tests)},[tests]);
  useEffect(()=>{sv(K_RUN,runs)},[runs]);
  useEffect(()=>{sv(K_RTST,rTests)},[rTests]);

  const today=todayStr();const now=new Date();
  const tomorrow=ymd(addDays(now,1));
  const activeMonth=new Date(activeDate).getMonth()+1;
  const isToday=activeDate===today;
  const plan=useMemo(()=>getActivePlan(activeMonth,tests),[activeMonth,tests]);
  const tl=getLog(logs,activeDate);
  const daysLeft=daysBetween(now,END);

  const goDate=useCallback(o=>{const ds=ymd(addDays(new Date(activeDate),o));if(ds<ymd(START)||ds>tomorrow)return;setActiveDate(ds)},[activeDate,tomorrow]);
  const goToday=useCallback(()=>setActiveDate(today),[today]);

  const updateLog=useCallback((ds,patch)=>{setLogs(p=>{const n={...p};n[ds]={...getLog(n,ds),...patch};return n})},[]);
  const add=useCallback(k=>{updateLog(activeDate,{[k]:(tl[k]||0)+1});if(navigator.vibrate)navigator.vibrate(25)},[activeDate,tl]);
  const sub=useCallback(k=>{if((tl[k]||0)===0)return;updateLog(activeDate,{[k]:tl[k]-1})},[activeDate,tl]);
  const toggle=useCallback(k=>{updateLog(activeDate,{[k]:!tl[k]});if(navigator.vibrate)navigator.vibrate(25)},[activeDate,tl]);
  const addCapped=useCallback((k,max)=>{updateLog(activeDate,{[k]:Math.min((tl[k]||0)+1,max)});if(navigator.vibrate)navigator.vibrate(25)},[activeDate,tl]);
  const subField=useCallback(k=>{if((tl[k]||0)===0)return;updateLog(activeDate,{[k]:tl[k]-1})},[activeDate,tl]);
  const saveTest=(d,p,u)=>setTests(prev=>{const n={...prev,[d]:{p:parseInt(p)||0,u:parseInt(u)||0}};sv(K_TST,n);return n});

  // 러닝 주간 카운트
  const weekMon=getWeekMon(now);
  let weekRuns=0;for(let i=0;i<7;i++){if(runs[ymd(addDays(weekMon,i))])weekRuns++}

  const realMonth=now.getMonth()+1;
  const realPlan=useMemo(()=>getActivePlan(realMonth,tests),[realMonth,tests]);

  // 달성률 계산
  const fc=useMemo(()=>{
    const sorted=Object.entries(tests).filter(([d])=>d<=today).sort(([a],[b])=>a.localeCompare(b));
    const latest=sorted.length?sorted[sorted.length-1][1]:{p:INIT.p,u:INIT.u};
    let tP=0,tU=0,aP=0,aU=0;const c=new Date(START);
    while(c<=now&&c<=END){const m=c.getMonth()+1;const bp=BASE_PLAN[m];
      if(bp&&c.getDay()!==0){tP+=bp.sets*bp.set.p;tU+=bp.sets*bp.set.u}
      const l=logs[ymd(c)];if(l&&bp){aP+=(l.p||0)*bp.set.p;aU+=(l.u||0)*bp.set.u}
      c.setDate(c.getDate()+1)}
    const pR=tP>0?aP/tP:0,uR=tU>0?aU/tU:0;
    const elapsed=daysBetween(START,now),total=daysBetween(START,END),remain=total-elapsed;
    const pj=Math.round(latest.p+(TARGET.p-latest.p)*Math.min(pR,1.2)*(remain/(remain+elapsed*0.3)));
    const uj=Math.round(latest.u+(TARGET.u-latest.u)*Math.min(uR,1.2)*(remain/(remain+elapsed*0.3)));
    return{pR,uR,pj,uj,pOk:pj>=80,uOk:uj>=20,latest,latestDate:sorted.length?sorted[sorted.length-1][0]:null};
  },[logs,tests,today]);

  const fcOk=fc.pOk&&fc.uOk;

  const goals=useMemo(()=>{
    let totalDays=0,bodyDays=0,brainMax=0,brainEarned=0;
    const c=new Date(START);
    while(c<=now&&c<=END){
      const{rate}=getDayRate(ymd(c));
      const adjRd=Math.max(1,Math.round(3*rate));const adjLn=Math.max(1,Math.round(3*rate));const adjYg=Math.max(1,Math.round(2*rate));
      totalDays++;brainMax+=1+adjYg+2+adjRd+1+adjLn;
      const l=logs[ymd(c)];const mp=BASE_PLAN[c.getMonth()+1];
      if(l&&mp){
        const adjS=Math.max(1,Math.round(mp.sets*rate));
        if((l.p||0)>=Math.ceil(adjS*0.5)&&(l.u||0)>=Math.ceil(adjS*0.5)&&l.plank)bodyDays++;
        if(l.nf)brainEarned+=1;
        const yv=l.yoga===true?1:(l.yoga||0);brainEarned+=Math.min(yv,adjYg);
        brainEarned+=Math.min(l.med||0,2);brainEarned+=Math.min(l.read||0,adjRd);
        if(l.write)brainEarned+=1;brainEarned+=Math.min(l.lang||0,adjLn);
      }c.setDate(c.getDate()+1)}
    const bR=totalDays>0?bodyDays/totalDays:0;const brR=brainMax>0?brainEarned/brainMax:0;
    // 러닝: 최근 8주 주 4회 일관성
    let rWeeks=0,rTotal=0;
    for(let w=0;w<8;w++){const wM=addDays(getWeekMon(now),-w*7);let wr=0;
      for(let i=0;i<7;i++){if(runs[ymd(addDays(wM,i))])wr++}rWeeks++;rTotal+=wr}
    const rRate=rWeeks>0?Math.min(rTotal/(rWeeks*4),1):0;
    const t5=rTests.filter(t=>t.type==="5K").sort((a,b)=>b.date.localeCompare(a.date))[0];
    const runOk=t5?parseFloat(t5.time)<=GOAL_5K:null;
    return{
      body:{rate:bR,ok:fcOk&&bR>=0.7,label:"푸시업80 풀업20",color:fcOk&&bR>=0.7?"#16a34a":"#dc2626"},
      brain:{rate:brR,ok:brR>=0.7,label:"전교1등 두뇌",color:brR>=0.7?"#16a34a":"#dc2626"},
      run:{rate:rRate,ok:runOk===true||(runOk===null&&rRate>=0.7),label:"5K30′ 10K55′",color:(runOk===true||(runOk===null&&rRate>=0.7))?"#16a34a":"#dc2626"},
      brainEarned,brainMax};
  },[logs,fcOk,runs,rTests]);

  const pctP=Math.min(100,(tl.p/plan.sets)*100),pctU=Math.min(100,(tl.u/plan.sets)*100);
  const nextTest=TEST_SCHEDULE.find(t=>t.date>=today);

  return(
    <div style={S.app}>
      {/* 상단 */}
      <div style={{padding:"8px 14px 4px",background:"linear-gradient(135deg,#e8f5e8,#f0f7f0)",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"#6b7c6b",fontSize:9,letterSpacing:"0.12em",fontWeight:800}}>단련 · 2026.12.31</div>
          <div style={{color:"#2d5a27",fontSize:10,fontWeight:700}}>D-{daysLeft}</div>
        </div>
      </div>
      {/* 3목표 고정 */}
      <div style={{flexShrink:0,background:"#f0f7f0"}}>
        <div style={{display:"flex",gap:4,padding:"6px 10px",borderBottom:"1px solid rgba(0,0,0,0.03)"}}>
          {[goals.body,goals.brain,goals.run].map((g,i)=>(
            <div key={i} style={{flex:1,borderRadius:8,padding:"6px 4px",border:`1.5px solid ${g.color}30`,background:g.ok?"rgba(22,163,74,0.08)":"rgba(220,38,38,0.06)",textAlign:"center"}}>
              <div style={{fontSize:8,color:g.color,fontWeight:900}}>{g.ok?"✓":"✕"}</div>
              <div style={{fontSize:10,fontWeight:900,color:"#1a2e1a",lineHeight:1.2}}>{g.label}</div>
              <div style={{fontSize:13,fontWeight:900,color:g.color,fontFamily:"ui-monospace,monospace",marginTop:1}}>{Math.round(g.rate*100)}%</div>
            </div>))}
        </div>
        <div style={S.nav}>
          {[{id:"today",l:"기록",i:"⊕"},{id:"run",l:"러닝",i:"🏃"},{id:"calendar",l:"캘린더",i:"▦"},{id:"test",l:"테스트",i:"▲"}].map(t=>(
            <button key={t.id} onClick={()=>setView(t.id)} style={{...S.navBtn,...(view===t.id?S.navAct:{})}}>
              <span style={{fontSize:14,fontWeight:900}}>{t.i}</span>
              <span style={{fontSize:9,fontWeight:700}}>{t.l}</span>
            </button>))}
        </div>
      </div>
      <div style={S.content}>
        {view==="today"&&<RecordView {...{plan,tl,activeDate,isToday,pctP,pctU,nextTest,today,tomorrow,now,goals,fc}} onAdd={add} onSub={sub} onToggle={toggle} onAddCapped={addCapped} onSubField={subField} goDate={goDate} goToday={goToday}/>}
        {view==="run"&&<RunView runs={runs} setRuns={setRuns} rTests={rTests} setRTests={setRTests} today={today} now={now} weekRuns={weekRuns} activeDate={activeDate} goDate={goDate} goToday={goToday} isToday={isToday} tomorrow={tomorrow}/>}
        {view==="calendar"&&<CalView logs={logs} runs={runs} tests={tests} rTests={rTests} calMonth={calMonth} setCalMonth={setCalMonth} today={today} onSelectDate={d=>{setActiveDate(d);setView("today")}}/>}
        {view==="test"&&<TestView tests={tests} onSave={saveTest} fc={fc} rTests={rTests} setRTests={setRTests} today={today} now={now}/>}
      </div>
    </div>
  );
}

/*═══ 기록 탭 ═══*/
function RecordView({plan,tl,activeDate,isToday,pctP,pctU,nextTest,today,tomorrow,now,goals,fc,onAdd,onSub,onToggle,onAddCapped,onSubField,goDate,goToday}){
  const d=new Date(activeDate);const dow=dayNames[d.getDay()];
  const{rate:wkRate,label:wkLabel}=getDayRate(activeDate);const isReduced=wkRate<1;
  const adjSets=Math.max(1,Math.round(plan.sets*wkRate));
  const adjRead=Math.max(1,Math.round(3*wkRate));const adjLang=Math.max(1,Math.round(3*wkRate));const adjYoga=Math.max(1,Math.round(2*wkRate));
  const adjPctP=Math.min(100,(tl.p/adjSets)*100),adjPctU=Math.min(100,(tl.u/adjSets)*100);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <button onClick={()=>goDate(-1)} style={S.dateNav}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:900,color:isToday?"#2d5a27":"#b45309"}}>{d.getMonth()+1}월 {d.getDate()}일 ({dow})</div>
          {!isToday&&activeDate!==tomorrow&&<div style={{display:"flex",justifyContent:"center",gap:8,marginTop:4}}>
            <span style={{color:"#b45309",fontSize:9,fontWeight:700}}>📝 과거 기록 수정 중</span>
            <button onClick={goToday} style={{color:"#2d5a27",fontSize:9,fontWeight:800,background:"rgba(22,163,74,0.1)",border:"1px solid rgba(22,163,74,0.3)",borderRadius:4,padding:"2px 8px",cursor:"pointer"}}>오늘로</button>
          </div>}
          {isToday&&<div style={{color:"#6b7c6b",fontSize:9,marginTop:2}}>오늘</div>}
          {activeDate===tomorrow&&<div style={{color:"#2563eb",fontSize:9,fontWeight:700,marginTop:2}}>📝 내일 것 미리 기록 중</div>}
        </div>
        <button onClick={()=>goDate(1)} style={{...S.dateNav,opacity:activeDate>=tomorrow?0.2:1}}>›</button>
      </div>

      {isReduced&&<div style={{...S.card,padding:10,borderLeft:"4px solid #2563eb",background:"rgba(37,99,235,0.04)"}}>
        <div style={{color:"#2563eb",fontSize:11,fontWeight:800}}>🌿 {wkLabel} 강도 (명상 제외)</div>
      </div>}

      {plan.adjusted&&plan.reason&&<div style={{...S.card,padding:10,borderLeft:`4px solid ${plan.behind?"#d97706":"#16a34a"}`,background:plan.behind?"rgba(217,119,6,0.06)":"rgba(22,163,74,0.06)"}}>
        <div style={{color:plan.behind?"#b45309":"#16a34a",fontSize:10,fontWeight:800}}>{plan.behind?"⚙ 자동 조정":"✓ 통과"} · {plan.reason}</div>
      </div>}

      <GoalHdr g={goals.body} detail={`P${fc.pj}·U${fc.uj}`}/>
      <Ctr label="💪 푸시업" sub={`${plan.set.p}회×${adjSets}세트${isReduced?" ("+wkLabel+")":""}`} count={tl.p} target={adjSets} vol={tl.p*plan.set.p} pct={adjPctP} color="#2563eb" onAdd={()=>onAdd("p")} onSub={()=>onSub("p")}/>
      <Ctr label="🏋️ 풀업" sub={`${plan.set.u}회×${adjSets}세트${isReduced?" ("+wkLabel+")":""}`} count={tl.u} target={adjSets} vol={tl.u*plan.set.u} pct={adjPctU} color="#7c3aed" onAdd={()=>onAdd("u")} onSub={()=>onSub("u")}/>
      <Chk icon="💪" label="복근운동" sub="1회" done={tl.plank} color="#d97706" onToggle={()=>onToggle("plank")}/>

      <GoalHdr g={goals.brain} detail={`${goals.brainEarned}/${goals.brainMax}점`}/>
      <MCtr label="🧘 명상" sub="10분이상×2회" count={tl.med||0} max={2} color="#0891b2" onAdd={()=>onAddCapped("med",2)} onSub={()=>onSubField("med")}/>
      <MCtr label="📖 읽기" sub={`20분×${adjRead}회${isReduced?" ("+wkLabel+")":""}`} count={tl.read||0} max={adjRead} color="#0d9488" onAdd={()=>onAddCapped("read",adjRead)} onSub={()=>onSubField("read")}/>
      <Chk icon="✏️" label="쓰기" sub="20분" done={tl.write} color="#6366f1" onToggle={()=>onToggle("write")}/>
      <MCtr label="🗣️ 영어 말하기" sub={`20분×${adjLang}회${isReduced?" ("+wkLabel+")":""}`} count={tl.lang||0} max={adjLang} color="#2563eb" onAdd={()=>onAddCapped("lang",adjLang)} onSub={()=>onSubField("lang")}/>
      <Chk icon="🔖" label="N.F." sub="" done={tl.nf} color="#a855f7" onToggle={()=>onToggle("nf")}/>

/*═══ 캘린더 ═══*/
function CalView({logs,runs,tests,rTests,calMonth,setCalMonth,today,onSelectDate}){
  const yr=calMonth.getFullYear(),mo=calMonth.getMonth();
  const fw=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
  const cells=[];for(let i=0;i<fw;i++)cells.push({d:new Date(yr,mo,-(fw-1-i)),out:true});
  for(let i=1;i<=dim;i++)cells.push({d:new Date(yr,mo,i),out:false});
  while(cells.length%7)cells.push({d:new Date(yr,mo+1,cells.length-fw-dim+1),out:true});
  const canP=new Date(yr,mo,1)>=new Date(2026,3,1),canN=new Date(yr,mo,1)<=new Date(2026,11,1);
  return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <button onClick={()=>canP&&setCalMonth(new Date(yr,mo-1,1))} style={{...S.calN,opacity:canP?1:.25}}>‹</button>
      <div style={{flex:1,textAlign:"center",fontSize:15,fontWeight:800}}>{yr}년 {mo+1}월</div>
      <button onClick={()=>canN&&setCalMonth(new Date(yr,mo+1,1))} style={{...S.calN,opacity:canN?1:.25}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {["일","월","화","수","목","금","토"].map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:9,fontWeight:800,padding:"4px 0",color:i===0?"#dc2626":"#6b7c6b"}}>{d}</div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {cells.map((c,i)=>{
        const ds=ymd(c.d);const isT=ds===today;const log=logs[ds];const run=runs[ds];
        const inR=c.d>=START&&c.d<=END&&!c.out;const canTap=inR&&ds<=ymd(addDays(new Date(today),1));
        const hol=isHoliday(ds);const sun=c.d.getDay()===0;const sat=c.d.getDay()===6;
        let hasBody=false,hasBrain=false;
        if(log){hasBody=(log.p||0)>0||(log.u||0)>0;hasBrain=!!(log.med||log.nf||log.yoga||log.read||log.write||log.lang)}
        return(<div key={i} onClick={()=>canTap&&onSelectDate(ds)}
          style={{minHeight:44,padding:2,borderRadius:5,cursor:canTap?"pointer":"default",
            background:isT?"rgba(22,163,74,0.12)":hol?"rgba(220,38,38,0.04)":"#fff",
            border:isT?"1.5px solid rgba(22,163,74,0.5)":"1px solid rgba(0,0,0,0.05)",opacity:c.out?0.2:1}}>
          <div style={{fontSize:9,fontWeight:isT?900:600,color:isT?"#16a34a":sun||hol?"#dc2626":"#1a2e1a",fontFamily:"ui-monospace,monospace"}}>{c.d.getDate()}</div>
          {inR&&<div style={{display:"flex",gap:2,marginTop:1,flexWrap:"wrap"}}>
            {hasBody&&<div style={{width:5,height:5,borderRadius:3,background:"#2563eb"}}/>}
            {hasBrain&&<div style={{width:5,height:5,borderRadius:3,background:"#16a34a"}}/>}
            {run&&<div style={{width:5,height:5,borderRadius:3,background:run.type==="인터벌"?"#d97706":"#0891b2"}}/>}
          </div>}
          {inR&&!hasBody&&!hasBrain&&!run&&(sat||sun||hol)&&<div style={{fontSize:6,color:"#2563eb"}}>{sat?"25%":"50%"}</div>}
        </div>);
      })}
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"center",fontSize:8,color:"#6b7c6b"}}>
      <span>🔵상체</span><span>🟢두뇌</span><span>🔵러닝</span><span>🟠인터벌</span>
    </div>
    <div style={{height:150}}/>
  </div>);
}

            {t5.slice(0,5).map((t,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 6px",borderRadius:5,background:"rgba(0,0,0,0.02)",marginBottom:2}}>
              <span style={{color:"#6b7c6b",fontSize:10}}>{t.date}</span>
              <span style={{color:parseFloat(t.time)<=GOAL_5K?"#16a34a":"#1a2e1a",fontSize:12,fontWeight:800,fontFamily:"ui-monospace,monospace"}}>{t.time}분{parseFloat(t.time)<=GOAL_5K?" ✓":""}</span>
            </div>))}
          </div>}
          {t10.length>0&&<div>
            <div style={{color:"#2563eb",fontSize:10,fontWeight:700,marginBottom:4}}>10K (목표: {GOAL_10K}분)</div>
            {t10.slice(0,5).map((t,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 6px",borderRadius:5,background:"rgba(0,0,0,0.02)",marginBottom:2}}>
              <span style={{color:"#6b7c6b",fontSize:10}}>{t.date}</span>
              <span style={{color:parseFloat(t.time)<=GOAL_10K?"#16a34a":"#1a2e1a",fontSize:12,fontWeight:800,fontFamily:"ui-monospace,monospace"}}>{t.time}분{parseFloat(t.time)<=GOAL_10K?" ✓":""}</span>
            </div>))}
          </div>}
        </div>
      )}

      {/* 상체 테스트 스케줄 */}
      <div style={S.card}>
        <div style={{fontSize:10,fontWeight:800,color:"#6b7c6b",marginBottom:6}}>상체 테스트 스케줄</div>
        {TEST_SCHEDULE.map(t=>{
          const r=tests[t.date];const isP=t.date<today;const isT=t.date===today;
          return(<div key={t.date} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:6,background:isT?"rgba(217,119,6,0.06)":"#fff",border:"1px solid rgba(0,0,0,0.04)",marginBottom:2}}>
            <div style={{width:38,fontSize:9,color:isT?"#b45309":"#6b7c6b",fontWeight:700,fontFamily:"ui-monospace,monospace"}}>{t.date.slice(5)}</div>
            <div style={{flex:1,fontSize:9,color:"#6b7c6b"}}>P{t.target.p}·U{t.target.u}</div>
            {r?<span style={{fontSize:9,fontWeight:800}}><span style={{color:r.p>=t.target.p?"#16a34a":"#dc2626"}}>P{r.p}</span>·<span style={{color:r.u>=t.target.u?"#16a34a":"#dc2626"}}>U{r.u}</span></span>
            :<span style={{color:isP?"#dc2626":"#8a9b8a",fontSize:8}}>{isP?"미측정":"예정"}</span>}
          </div>)})}
      </div>
      <div style={{height:150}}/>
    </div>
  );
}

/*═══ STYLES ═══*/
const S={
  app:{background:"#f0f7f0",height:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",paddingTop:"env(safe-area-inset-top)",overflow:"hidden"},

  navAct:{color:"#16a34a",borderBottomColor:"#16a34a",background:"rgba(22,163,74,0.04)"},
  content:{flex:1,padding:10,overflowY:"auto",WebkitOverflowScrolling:"touch"},
  card:{background:"#fff",borderRadius:11,padding:12,border:"1px solid rgba(0,0,0,0.06)",boxShadow:"0 1px 2px rgba(0,0,0,0.03)"},
  info:{background:"rgba(0,0,0,0.02)",borderRadius:7,padding:"7px 9px",color:"#6b7c6b",fontSize:9,border:"1px solid rgba(0,0,0,0.04)"},
  btn:{height:46,borderRadius:9,border:"1px solid rgba(0,0,0,0.08)",background:"#fff",color:"#6b7c6b",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},
  inp:{width:"100%",padding:"10px 12px",background:"#f0f7f0",border:"1px solid rgba(0,0,0,0.1)",borderRadius:9,color:"#1a2e1a",fontSize:14,fontWeight:600},
  calN:{width:32,height:32,borderRadius:8,background:"#fff",border:"1px solid rgba(0,0,0,0.08)",color:"#6b7c6b",fontSize:16,cursor:"pointer",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"},
  dateNav:{width:38,height:38,borderRadius:9,background:"#fff",border:"1px solid rgba(0,0,0,0.08)",color:"#6b7c6b",fontSize:18,cursor:"pointer",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
