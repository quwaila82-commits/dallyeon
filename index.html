<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="단련">
<meta name="theme-color" content="#f0f7f0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>단련 v4.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#f0f7f0;overflow:hidden;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:#1a2e1a}
button,input{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const h=React.createElement;
const{useState,useEffect,useMemo,useCallback}=React;

/* ===== CONFIG ===== */
const VER="v4.0";
const START=new Date(2026,3,18), END=new Date(2026,11,31);
const RSTART=new Date(2026,5,1);
const TARGET={p:80,u:20}, INIT={p:30,u:10};
const G5K=27, G10K=54;

const BP={
 4:{mx:{p:30,u:10},st:{p:15,u:6},sets:4,ph:"적응기"},
 5:{mx:{p:34,u:11},st:{p:17,u:7},sets:4,ph:"적응기"},
 6:{mx:{p:38,u:12},st:{p:20,u:7},sets:5,ph:"기초 축적"},
 7:{mx:{p:43,u:13},st:{p:22,u:8},sets:5,ph:"기초 축적"},
 8:{mx:{p:48,u:14},st:{p:25,u:8},sets:5,ph:"볼륨 확장"},
 9:{mx:{p:54,u:16},st:{p:28,u:10},sets:6,ph:"볼륨 확장"},
 10:{mx:{p:60,u:17},st:{p:31,u:10},sets:6,ph:"강화기"},
 11:{mx:{p:70,u:18},st:{p:36,u:11},sets:6,ph:"강화기"},
 12:{mx:{p:80,u:20},st:{p:42,u:12},sets:7,ph:"피크"},
};

const BT=[
 {d:"2026-05-16",t:{p:34,u:11}},{d:"2026-06-13",t:{p:38,u:12}},
 {d:"2026-07-11",t:{p:43,u:13}},{d:"2026-08-08",t:{p:48,u:14}},
 {d:"2026-09-05",t:{p:54,u:16}},{d:"2026-10-03",t:{p:60,u:17}},
 {d:"2026-10-31",t:{p:70,u:18}},{d:"2026-11-28",t:{p:70,u:18}},
 {d:"2026-12-26",t:{p:80,u:20}},
];

const IV={
 6:{s:"200m×8",r:"200m조깅",p:"4:30~4:50",t:22,n:"신경근 깨우기",ph:"P1"},
 7:{s:"400m×6",r:"200m조깅",p:"4:40~5:00",t:28,n:"기초 스피드",ph:"P1"},
 8:{s:"4분×4",r:"3분조깅",p:"5:00~5:10",t:30,n:"Seiler 4×4",ph:"P2"},
 9:{s:"800m×5",r:"400m조깅",p:"4:50~5:10",t:32,n:"VO2max",ph:"P2"},
 10:{s:"1000m×4",r:"400m조깅",p:"5:10~5:20",t:34,n:"레이스페이스",ph:"P3"},
 11:{s:"1000m×5",r:"400m조깅",p:"5:15~5:25",t:38,n:"유지력",ph:"P3"},
 12:{s:"1200m×4",r:"400m조깅",p:"5:20~5:30",t:36,n:"시뮬레이션",ph:"P4"},
 1:{s:"1200m×5",r:"400m조깅",p:"5:15~5:25",t:40,n:"볼륨 피크",ph:"P4"},
 2:{s:"2000m×3",r:"600m조깅",p:"5:20~5:30",t:38,n:"리허설",ph:"P5"},
 3:{s:"2km×3+1km×2",r:"600m",p:"5:20~5:30",t:40,n:"실전대비",ph:"P5"},
 4:{s:"1000m×4",r:"400m조깅",p:"5:20~5:25",t:32,n:"샤프닝",ph:"P6"},
 5:{s:"800m×3",r:"400m조깅",p:"5:15~5:20",t:25,n:"최종",ph:"P6"},
};

const RTD=[
 {d:"2026-07-25",l:"7월 첫5K"},{d:"2026-08-29",l:"8월 5K"},
 {d:"2026-09-26",l:"9월 5K+첫10K"},{d:"2026-10-31",l:"10월 10K"},
 {d:"2026-11-28",l:"11월 10K"},{d:"2026-12-26",l:"12월 10K"},
 {d:"2027-01-30",l:"1월 10K"},{d:"2027-02-27",l:"2월 10K"},
 {d:"2027-03-27",l:"3월 10K"},{d:"2027-04-26",l:"4월 리허설"},
 {d:"2027-05-24",l:"5월 최종🏁"},
];

const HOL=new Set(["2026-01-01","2026-01-29","2026-01-30","2026-01-31","2026-03-01","2026-05-05","2026-05-24","2026-06-06","2026-08-15","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-09","2026-12-25"]);

/* ===== HELPERS ===== */
const ymd=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>ymd(new Date());
const db=(a,b)=>Math.round((b-a)/86400000);
const ad=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const DN=["일","월","화","수","목","금","토"];
const wm=d=>{const x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));return new Date(x.getFullYear(),x.getMonth(),x.getDate())};
const isWE=d=>{const w=new Date(d).getDay();return w===0||w===6};

const K1="gtg-v4-logs",K2="gtg-v4-tests",K3="rk4-runs",K4="rk4-tests";
const ld=k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

const eLog=()=>({p:0,u:0,plank:false,yoga:0,med:0,nf:false,read:0,write:false,lang:0});
const gL=(L,d)=>{const l=L[d];if(!l)return eLog();const o={...eLog(),...l};if(o.yoga===true)o.yoga=1;if(o.yoga===false)o.yoga=0;return o};

function aPlan(mo,T){
 const b=BP[mo]||BP[4];
 const s=Object.entries(T).filter(([d])=>{const m=new Date(d).getMonth()+1;return m<mo||(m===mo&&new Date(d).getDate()<=15)}).sort(([a],[b])=>a.localeCompare(b));
 if(!s.length)return{...b,adj:false,rsn:null};
 const[td,r]=s[s.length-1];
 const aP=r.p||INIT.p,aU=r.u||INIT.u;
 const ti=BT.find(t=>t.d===td);
 const tP=ti?ti.t.p:b.mx.p,tU=ti?ti.t.u:b.mx.u;
 if(aP>=tP&&aU>=tU)return{...b,adj:true,behind:false,rsn:td.slice(5)+" 통과"};
 return{...b,st:{p:Math.max(Math.round(aP*0.55),10),u:Math.max(Math.round(aU*0.55),5)},
   sets:Math.min(b.sets+1,8),adj:true,behind:true,rsn:td.slice(5)+" 미달→조정"};
}

function wkRun(R,d){const m=wm(d);let e=0,i=0;for(let j=0;j<7;j++){const r=R[ymd(ad(m,j))];if(r){if(r.type==="인터벌")i++;else e++}}return{e,i,t:e+i}}

/* ===== APP ===== */
function App(){
 const[L,sL]=useState(()=>ld(K1)||{});
 const[T,sT]=useState(()=>ld(K2)||{});
 const[R,sR]=useState(()=>ld(K3)||{});
 const[RT,sRT]=useState(()=>ld(K4)||[]);
 const[vw,sVw]=useState("rec");
 const[aD,sAD]=useState(today());
 const[cM,sCM]=useState(()=>new Date(new Date().getFullYear(),new Date().getMonth(),1));

 useEffect(()=>sv(K1,L),[L]);
 useEffect(()=>sv(K2,T),[T]);
 useEffect(()=>sv(K3,R),[R]);
 useEffect(()=>sv(K4,RT),[RT]);

 const td=today(),now=new Date(),tmr=ymd(ad(now,1));
 const isT=aD===td,mo=new Date(aD).getMonth()+1;
 const plan=useMemo(()=>aPlan(mo,T),[mo,T]);
 const tl=gL(L,aD);
 const dLeft=db(now,END);
 const rMo=now.getMonth()+1;
 const rPlan=useMemo(()=>aPlan(rMo,T),[rMo,T]);

 const go=useCallback(o=>{const d=ymd(ad(new Date(aD),o));if(d<ymd(START)||d>tmr)return;sAD(d)},[aD,tmr]);
 const goT=useCallback(()=>sAD(td),[td]);
 const uL=useCallback((d,p)=>sL(pr=>{const n={...pr};n[d]={...gL(n,d),...p};return n}),[]);
 const af=useCallback(k=>{uL(aD,{[k]:(tl[k]||0)+1})},[aD,tl]);
 const sf=useCallback(k=>{if((tl[k]||0)>0)uL(aD,{[k]:tl[k]-1})},[aD,tl]);
 const tg=useCallback(k=>{uL(aD,{[k]:!tl[k]})},[aD,tl]);
 const ac=useCallback((k,m)=>{uL(aD,{[k]:Math.min((tl[k]||0)+1,m)})},[aD,tl]);
 const sc=useCallback(k=>{if((tl[k]||0)>0)uL(aD,{[k]:tl[k]-1})},[aD,tl]);
 const svT=(d,p,u)=>sT(pr=>{const n={...pr};if(p===null)delete n[d];else n[d]={p:+p||0,u:+u||0};sv(K2,n);return n});

 const wk=wkRun(R,now);

 // forecast
 const fc=useMemo(()=>{
  const s=Object.entries(T).filter(([d])=>d<=td).sort(([a],[b])=>a.localeCompare(b));
  const lat=s.length?s[s.length-1][1]:{p:INIT.p,u:INIT.u};
  let tP=0,tU=0,aP=0,aU=0;const c=new Date(START);
  while(c<=now&&c<=END){const m=c.getMonth()+1;const bp=BP[m];
   if(bp&&!isWE(c)){tP+=bp.sets*bp.st.p;tU+=bp.sets*bp.st.u}
   const l=L[ymd(c)];if(l&&bp){aP+=(l.p||0)*bp.st.p;aU+=(l.u||0)*bp.st.u}
   c.setDate(c.getDate()+1)}
  const pR=tP>0?aP/tP:0,uR=tU>0?aU/tU:0;
  const el=db(START,now),tot=db(START,END),rm=tot-el;
  const pj=Math.round(lat.p+(TARGET.p-lat.p)*Math.min(pR,1.2)*(rm/(rm+el*0.3)));
  const uj=Math.round(lat.u+(TARGET.u-lat.u)*Math.min(uR,1.2)*(rm/(rm+el*0.3)));
  return{pj,uj,pOk:pj>=80,uOk:uj>=20};
 },[L,T,td]);
 const fcOk=fc.pOk&&fc.uOk;

 // goals
 const goals=useMemo(()=>{
  let tD=0,bD=0,brMx=0,brE=0;
  const c=new Date(START);
  while(c<=now&&c<=END){
   if(!isWE(c)){
    tD++;brMx+=12+(c>=RSTART?2:0);
    const l=L[ymd(c)];const mp=BP[c.getMonth()+1];const run=R[ymd(c)];
    if(l&&mp){
     if((l.p||0)>=Math.ceil(mp.sets*0.5)&&(l.u||0)>=Math.ceil(mp.sets*0.5)&&l.plank)bD++;
     if(l.nf)brE++;
     const yv=l.yoga===true?1:(l.yoga||0);brE+=Math.min(yv,2);
     brE+=Math.min(l.med||0,2);brE+=Math.min(l.read||0,3);
     if(l.write)brE++;brE+=Math.min(l.lang||0,3);
    }
    if(c>=RSTART&&run)brE+=2;
   }
   c.setDate(c.getDate()+1);
  }
  const bR=tD>0?bD/tD:0,brR=brMx>0?brE/brMx:0;

  // running weekly compliance
  const allR=Object.keys(R).filter(d=>new Date(d)>=RSTART).sort();
  let gW=0,tW=0;
  if(allR.length>0){
   let w=new Date(wm(new Date(allR[0])));const cw=wm(now);
   while(w<cw){tW++;let wr=0,wi=0;
    for(let i=0;i<7;i++){const r=R[ymd(ad(w,i))];if(r){wr++;if(r.type==="인터벌")wi++}}
    if(wr>=3&&wi>=1)gW++;w=ad(w,7);
   }
  }
  const rR=tW>0?gW/tW:1;

  return{
   body:{rate:bR,ok:fcOk&&bR>=0.7,label:"푸시업80 풀업20",color:fcOk&&bR>=0.7?"#16a34a":"#dc2626"},
   brain:{rate:brR,ok:brR>=0.7,label:"전교1등 두뇌",color:brR>=0.7?"#16a34a":"#dc2626"},
   run:{rate:rR,ok:rR>=0.7,label:"10K54′(27.5)",color:rR>=0.7?"#16a34a":"#dc2626",gW,tW},
   brE,brMx};
 },[L,fcOk,R,RT]);

 const nxBT=BT.find(t=>t.d>=td);
 const nxRT=RTD.find(t=>t.d>=td);

 return(
  <div style={S.app}>
   <div style={{padding:"8px 14px 4px",background:"linear-gradient(135deg,#e8f5e8,#f0f7f0)",flexShrink:0}}>
    <div style={{display:"flex",justifyContent:"space-between"}}>
     <span style={{color:"#6b7c6b",fontSize:9,fontWeight:800}}>단련 {VER}</span>
     <span style={{color:"#2d5a27",fontSize:10,fontWeight:700}}>D-{dLeft}</span>
    </div>
   </div>
   <div style={{flexShrink:0}}>
    <div style={{display:"flex",gap:4,padding:"6px 10px",borderBottom:"1px solid rgba(0,0,0,0.03)"}}>
     {[goals.body,goals.brain,goals.run].map((g,i)=>(
      <div key={i} style={{flex:1,borderRadius:8,padding:"5px 3px",border:"1.5px solid "+g.color+"30",background:g.ok?"rgba(22,163,74,0.08)":"rgba(220,38,38,0.06)",textAlign:"center"}}>
       <div style={{fontSize:8,color:g.color,fontWeight:900}}>{g.ok?"✓":"✕"}</div>
       <div style={{fontSize:10,fontWeight:900,lineHeight:1.2}}>{g.label}</div>
       <div style={{fontSize:13,fontWeight:900,color:g.color,fontFamily:"monospace",marginTop:1}}>{Math.round(g.rate*100)}%</div>
      </div>))}
    </div>
    <div style={S.nav}>
     {[{id:"rec",l:"기록",i:"⊕"},{id:"run",l:"러닝",i:"🏃"},{id:"cal",l:"캘린더",i:"▦"},{id:"tst",l:"테스트",i:"▲"}].map(t=>(
      <button key={t.id} onClick={()=>sVw(t.id)} style={{...S.nb,...(vw===t.id?S.na:{})}}>
       <span style={{fontSize:14}}>{t.i}</span><span style={{fontSize:9}}>{t.l}</span>
      </button>))}
    </div>
   </div>
   <div style={S.ct}>
    {vw==="rec"&&<Rec plan={plan} tl={tl} aD={aD} isT={isT} td={td} tmr={tmr} now={now} goals={goals} fc={fc} af={af} sf={sf} tg={tg} ac={ac} sc={sc} go={go} goT={goT}/>}
    {vw==="run"&&<Run R={R} sR={sR} td={td} now={now} wk={wk} aD={aD} go={go} goT={goT} isT={isT} tmr={tmr} goals={goals} nxRT={nxRT}/>}
    {vw==="cal"&&<Cal L={L} R={R} cM={cM} sCM={sCM} td={td} onSel={d=>{sAD(d);sVw("rec")}}/>}
    {vw==="tst"&&<Tst T={T} svT={svT} fc={fc} RT={RT} sRT={sRT} td={td} goals={goals}/>}
   </div>
  </div>
 );
}

/* ===== 기록 탭 ===== */
function Rec({plan,tl,aD,isT,td,tmr,now,goals,fc,af,sf,tg,ac,sc,go,goT}){
 const d=new Date(aD),dw=DN[d.getDay()],we=isWE(aD);
 return(
  <div style={{display:"flex",flexDirection:"column",gap:10}}>
   <Nav d={d} dw={dw} isT={isT} aD={aD} tmr={tmr} go={go} goT={goT}/>
   {we?(
    <div style={{...S.cd,textAlign:"center",padding:24}}>
     <div style={{fontSize:28,marginBottom:8}}>😴</div>
     <div style={{color:"#6b7c6b",fontSize:14,fontWeight:700}}>주말 · 완전 휴식</div>
     <div style={{color:"#8a9b8a",fontSize:10,marginTop:6}}>주중에만 훈련 기록</div>
    </div>
   ):(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
     {plan.adj&&plan.rsn&&<div style={{...S.cd,padding:9,borderLeft:"4px solid "+(plan.behind?"#d97706":"#16a34a")}}>
      <div style={{color:plan.behind?"#b45309":"#16a34a",fontSize:10,fontWeight:800}}>{plan.rsn}</div></div>}

     <GH g={goals.body} det={"P"+fc.pj+"·U"+fc.uj}/>
     <Ct l="💪 푸시업" s={plan.st.p+"회×"+plan.sets+"세트"} c={tl.p} t={plan.sets} v={tl.p*plan.st.p} co="#2563eb" oA={()=>af("p")} oS={()=>sf("p")}/>
     <Ct l="🏋️ 풀업" s={plan.st.u+"회×"+plan.sets+"세트"} c={tl.u} t={plan.sets} v={tl.u*plan.st.u} co="#7c3aed" oA={()=>af("u")} oS={()=>sf("u")}/>
     <Ck i="💪" l="복근운동" s="1회" dn={tl.plank} co="#d97706" oT={()=>tg("plank")}/>

     <GH g={goals.brain} det={goals.brE+"/"+goals.brMx}/>
     <MC l="🧘 명상" s="10분이상×2회" c={tl.med||0} m={2} co="#0891b2" oA={()=>ac("med",2)} oS={()=>sc("med")}/>
     <MC l="📖 읽기" s="20분×3회" c={tl.read||0} m={3} co="#0d9488" oA={()=>ac("read",3)} oS={()=>sc("read")}/>
     <Ck i="✏️" l="쓰기" s="20분" dn={tl.write} co="#6366f1" oT={()=>tg("write")}/>
     <MC l="🗣️ 영어 말하기" s="20분×3회" c={tl.lang||0} m={3} co="#2563eb" oA={()=>ac("lang",3)} oS={()=>sc("lang")}/>
     <Ck i="🔖" l="N.F." s="" dn={tl.nf} co="#a855f7" oT={()=>tg("nf")}/>
     <MC l="🧘‍♀️ 요가/스트레칭" s="10분×2회" c={tl.yoga||0} m={2} co="#16a34a" oA={()=>ac("yoga",2)} oS={()=>sc("yoga")}/>
     <div style={{...S.inf,textAlign:"center"}}>GtG · 실패까지 가지 말 것 · 세트 간 15분+</div>
    </div>
   )}
   <div style={{height:160}}/>
  </div>
 );
}

/* ===== 러닝 탭 ===== */
function Run({R,sR,td,now,wk,aD,go,goT,isT,tmr,goals,nxRT}){
 const d=new Date(aD),dw=DN[d.getDay()],mo=d.getMonth()+1;
 const cr=R[aD],iv=IV[mo];
 const[mn,sMn]=useState("");
 const[sv2,sSv]=useState(false);
 const logR=type=>{sR(p=>({...p,[aD]:{minutes:mn||"30",type,ts:Date.now()}}));sSv(true);sMn("");setTimeout(()=>sSv(false),1500)};
 const delR=()=>sR(p=>{const n={...p};delete n[aD];return n});

 return(
  <div style={{display:"flex",flexDirection:"column",gap:10}}>
   <Nav d={d} dw={dw} isT={isT} aD={aD} tmr={tmr} go={go} goT={goT}/>
   <div style={{...S.cd,padding:12}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
     <span style={{fontSize:13,fontWeight:800}}>이번 주</span>
     <span style={{color:goals.run.ok?"#16a34a":"#dc2626",fontSize:10,fontWeight:800}}>
      {goals.run.tW===0?"✓ 100% · 첫 러닝부터 카운트":goals.run.gW+"/"+goals.run.tW+"주 달성"}
     </span>
    </div>
    <div style={{display:"flex",gap:6,justifyContent:"center"}}>
     {[0,1,2].map(i=><div key={i} style={{width:18,height:18,borderRadius:5,background:i<wk.e?"#0891b2":"rgba(0,0,0,0.06)"}}/>)}
     <div style={{width:18,height:18,borderRadius:5,background:wk.i>=1?"#d97706":"rgba(0,0,0,0.06)"}}/>
     <span style={{fontSize:10,fontWeight:700,color:"#6b7c6b",marginLeft:4}}>{wk.t}/4{wk.t>=4?" 🎉":""}</span>
    </div>
   </div>

   {cr?(
    <div style={{...S.cd,borderLeft:"4px solid #16a34a"}}>
     <div style={{display:"flex",justifyContent:"space-between"}}>
      <span style={{color:"#16a34a",fontSize:14,fontWeight:800}}>✓ {cr.type} {cr.minutes}분</span>

function Cal({L,R,cM,sCM,td,onSel}){
 const yr=cM.getFullYear(),mo=cM.getMonth();
 const fw=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
 const cs=[];
 for(let i=0;i<fw;i++)cs.push({d:new Date(yr,mo,-(fw-1-i)),out:true});
 for(let i=1;i<=dim;i++)cs.push({d:new Date(yr,mo,i),out:false});
 while(cs.length%7)cs.push({d:new Date(yr,mo+1,cs.length-fw-dim+1),out:true});
 const cP=new Date(yr,mo,1)>=new Date(2026,3,1),cN=new Date(yr,mo,1)<=new Date(2026,11,1);
 return(
  <div style={{display:"flex",flexDirection:"column",gap:8}}>
   <div style={{display:"flex",alignItems:"center",gap:6}}>
    <button onClick={()=>cP&&sCM(new Date(yr,mo-1,1))} style={{...S.cn,opacity:cP?1:.25}}>‹</button>
    <div style={{flex:1,textAlign:"center",fontSize:15,fontWeight:800}}>{yr}년 {mo+1}월</div>
    <button onClick={()=>cN&&sCM(new Date(yr,mo+1,1))} style={{...S.cn,opacity:cN?1:.25}}>›</button>
   </div>
   <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>

   </div>
   <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
    {cs.map((c,i)=>{
     const ds=ymd(c.d),iT=ds===td,log=L[ds],run=R[ds];
     const inR=c.d>=START&&c.d<=END&&!c.out,tap=inR&&ds<=ymd(ad(new Date(td),1));
     const we=isWE(c.d),hl=HOL.has(ds);
     let hB=false,hBr=false;

     return(
      <div key={i} onClick={()=>tap&&onSel(ds)} style={{minHeight:44,padding:2,borderRadius:5,

       {inR&&(
        <div style={{display:"flex",gap:2,marginTop:1}}>
         {hB&&<div style={{width:5,height:5,borderRadius:3,background:"#2563eb"}}/>}
         {hBr&&<div style={{width:5,height:5,borderRadius:3,background:"#16a34a"}}/>}
         {run&&<div style={{width:5,height:5,borderRadius:3,background:run.type==="인터벌"?"#d97706":"#0891b2"}}/>}
         {!hB&&!hBr&&!run&&we&&<div style={{fontSize:6,color:"#8a9b8a"}}>휴</div>}
