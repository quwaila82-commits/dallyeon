<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="단련">
<meta name="theme-color" content="#f0f7f0">
<title>단련</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#f0f7f0;overflow:hidden;height:100%;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:#1a2e1a}
button,input{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const{useState,useEffect,useMemo,useCallback}=React;

const START=new Date(2026,3,18);const END=new Date(2026,11,31);
const TARGET={p:80,u:20};const INIT={p:30,u:10};

const BASE_PLAN={
  4:{max:{p:30,u:10},set:{p:15,u:6},sets:4,phase:"적응기",days:13},
  5:{max:{p:34,u:11},set:{p:17,u:7},sets:4,phase:"적응기",days:31},
  6:{max:{p:38,u:12},set:{p:20,u:7},sets:5,phase:"기초 축적",days:30},
  7:{max:{p:43,u:13},set:{p:22,u:8},sets:5,phase:"기초 축적",days:31},
  8:{max:{p:48,u:14},set:{p:25,u:8},sets:5,phase:"볼륨 확장",days:31},
  9:{max:{p:54,u:16},set:{p:28,u:10},sets:6,phase:"볼륨 확장",days:30},
  10:{max:{p:60,u:17},set:{p:31,u:10},sets:6,phase:"강화기",days:31},
  11:{max:{p:70,u:18},set:{p:36,u:11},sets:6,phase:"강화기",days:30},
  12:{max:{p:80,u:20},set:{p:42,u:12},sets:7,phase:"피크",days:31},
};

const TEST_SCHEDULE=[
  {date:"2026-05-16",target:{p:34,u:11}},{date:"2026-06-13",target:{p:38,u:12}},
  {date:"2026-07-11",target:{p:43,u:13}},{date:"2026-08-08",target:{p:48,u:14}},
  {date:"2026-09-05",target:{p:54,u:16}},{date:"2026-10-03",target:{p:60,u:17}},
  {date:"2026-10-31",target:{p:70,u:18}},{date:"2026-11-28",target:{p:70,u:18}},
  {date:"2026-12-26",target:{p:80,u:20}},
];

const ymd=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr=()=>ymd(new Date());
const daysBetween=(a,b)=>Math.round((b-a)/86400000);
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const dayNames=["일","월","화","수","목","금","토"];

// 2026년 대한민국 법정공휴일
const HOLIDAYS=new Set([
  "2026-01-01","2026-01-29","2026-01-30","2026-01-31", // 신정, 설날연휴
  "2026-03-01","2026-05-05","2026-05-24", // 삼일절, 어린이날, 부처님오신날
  "2026-06-06","2026-08-15", // 현충일, 광복절
  "2026-09-24","2026-09-25","2026-09-26", // 추석연휴
  "2026-10-03","2026-10-09","2026-12-25", // 개천절, 한글날, 성탄절
]);
const isHoliday=ds=>HOLIDAYS.has(ds);
// 감량률: 토25%, 일50%, 공휴일50%, 평일100%
const getDayRate=(date)=>{
  const d=new Date(date);const wd=d.getDay();const ds=ymd(d);
  if(wd===6)return{rate:0.25,label:"토요일 25%"};
  if(wd===0)return{rate:0.5,label:"일요일 50%"};
  if(isHoliday(ds))return{rate:0.5,label:"공휴일 50%"};
  return{rate:1,label:""};
};

const KEY_LOGS="gtg-v4-logs";const KEY_TEST="gtg-v4-tests";
const load=k=>{try{return JSON.parse(localStorage.getItem(k)||"{}")}catch{return{}}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

const emptyLog=()=>({p:0,u:0,plank:false,yoga:false,med:0,nf:false,read:0,write:false,lang:0});
const getLog=(logs,ds)=>{const l=logs[ds];return l?{...emptyLog(),...l}:emptyLog()};

function getActivePlan(month,tests){
  const base=BASE_PLAN[month]||BASE_PLAN[4];
  const sorted=Object.entries(tests).filter(([d])=>{const dm=new Date(d).getMonth()+1;return dm<month||(dm===month&&new Date(d).getDate()<=15)}).sort(([a],[b])=>a.localeCompare(b));
  if(!sorted.length)return{...base,adjusted:false,reason:null};
  const[testDate,result]=sorted[sorted.length-1];
  const actualP=result.p||INIT.p,actualU=result.u||INIT.u;
  const testInfo=TEST_SCHEDULE.find(t=>t.date===testDate);
  const targetP=testInfo?testInfo.target.p:base.max.p,targetU=testInfo?testInfo.target.u:base.max.u;
  const behindP=actualP<targetP,behindU=actualU<targetU,behind=behindP||behindU;
  const adjSetP=Math.max(Math.round(actualP*0.55),10);
  const adjSetU=Math.max(Math.round(actualU*0.55),5);
  const adjSets=behind?Math.min(base.sets+1,8):base.sets;
  let reason=behind?`${testDate.slice(5)} 미달 → 세트수 ${base.sets}→${adjSets}, 회수 실측 기준`:`${testDate.slice(5)} 통과 → 기본 플랜 유지`;
  return{...base,set:{p:adjSetP,u:adjSetU},sets:adjSets,adjusted:true,behind,reason};
}

function App(){
  const[logs,setLogs]=useState(()=>load(KEY_LOGS));
  const[tests,setTests]=useState(()=>load(KEY_TEST));
  const[view,setView]=useState("today");
  const[activeDate,setActiveDate]=useState(todayStr());
  const[calMonth,setCalMonth]=useState(()=>new Date(new Date().getFullYear(),new Date().getMonth(),1));

  useEffect(()=>{sv(KEY_LOGS,logs)},[logs]);
  useEffect(()=>{sv(KEY_TEST,tests)},[tests]);

  const today=todayStr();const now=new Date();
  const activeMonth=new Date(activeDate).getMonth()+1;
  const isToday=activeDate===today;
  const plan=useMemo(()=>getActivePlan(activeMonth,tests),[activeMonth,tests]);
  const tl=getLog(logs,activeDate);
  const daysLeft=daysBetween(now,END);

  const tomorrow=ymd(addDays(now,1));
  const goDate=useCallback(o=>{const ds=ymd(addDays(new Date(activeDate),o));if(ds<ymd(START)||ds>tomorrow)return;setActiveDate(ds)},[activeDate,tomorrow]);
  const goToday=useCallback(()=>setActiveDate(today),[today]);

  const updateLog=useCallback((ds,patch)=>{setLogs(p=>{const n={...p};n[ds]={...getLog(n,ds),...patch};return n})},[]);
  const add=useCallback(k=>{updateLog(activeDate,{[k]:(tl[k]||0)+1});if(navigator.vibrate)navigator.vibrate(25)},[activeDate,tl]);
  const sub=useCallback(k=>{if((tl[k]||0)===0)return;updateLog(activeDate,{[k]:tl[k]-1})},[activeDate,tl]);
  const toggle=useCallback(k=>{updateLog(activeDate,{[k]:!tl[k]});if(navigator.vibrate)navigator.vibrate(25)},[activeDate,tl]);
  const addCapped=useCallback((k,max)=>{updateLog(activeDate,{[k]:Math.min((tl[k]||0)+1,max)});if(navigator.vibrate)navigator.vibrate(25)},[activeDate,tl]);
  const subField=useCallback(k=>{if((tl[k]||0)===0)return;updateLog(activeDate,{[k]:tl[k]-1})},[activeDate,tl]);
  const saveTest=(d,p,u)=>setTests(prev=>{const n={...prev,[d]:{p:parseInt(p)||0,u:parseInt(u)||0}};sv(KEY_TEST,n);return n});

  const realMonth=now.getMonth()+1;
  const realPlan=useMemo(()=>getActivePlan(realMonth,tests),[realMonth,tests]);

  const mCum=useMemo(()=>{
    let sP=0,sU=0,vP=0,vU=0,plank=0,yoga=0,med=0,nf=0,read=0,write=0,lang=0,td=0;
    const mp=BASE_PLAN[realMonth];if(!mp)return{sP,sU,vP,vU,plank,yoga,med,nf,read,write,lang,td,trainDays:0,mvP:0,mvU:0};
    Object.entries(logs).forEach(([d,l])=>{const dt=new Date(d);
      if(dt.getMonth()+1===realMonth&&dt.getFullYear()===2026){
        sP+=l.p||0;sU+=l.u||0;vP+=(l.p||0)*realPlan.set.p;vU+=(l.u||0)*realPlan.set.u;
        if(l.plank)plank++;if(l.yoga)yoga++;med+=(l.med||0);if(l.nf)nf++;
        read+=(l.read||0);if(l.write)write++;lang+=(l.lang||0);
        if((l.p||0)>0||(l.u||0)>0||l.plank||l.yoga||(l.med||0)>0||l.nf||(l.read||0)>0||l.write||(l.lang||0)>0)td++;
      }
    });
    const trainDays=Math.round(mp.days*6/7);
    return{sP,sU,vP,vU,plank,yoga,med,nf,read,write,lang,td,trainDays,mvP:trainDays*realPlan.sets*realPlan.set.p,mvU:trainDays*realPlan.sets*realPlan.set.u};
  },[logs,realMonth,realPlan]);

  const fc=useMemo(()=>{
    const sorted=Object.entries(tests).filter(([d])=>d<=today).sort(([a],[b])=>a.localeCompare(b));
    const latest=sorted.length?sorted[sorted.length-1][1]:{p:INIT.p,u:INIT.u};
    let tP=0,tU=0,aP=0,aU=0;const c=new Date(START);
    while(c<=now&&c<=END){const m=c.getMonth()+1;const bp=BASE_PLAN[m];
      if(bp&&c.getDay()!==0){tP+=bp.sets*bp.set.p;tU+=bp.sets*bp.set.u}
      const l=logs[ymd(c)];if(l&&bp){aP+=(l.p||0)*bp.set.p;aU+=(l.u||0)*bp.set.u}
      c.setDate(c.getDate()+1)}
    const pR=tP>0?aP/tP:0,uR=tU>0?aU/tU:0;
    const elapsed=daysBetween(START,now),total=daysBetween(START,END),remain=total-elapsed;
    const pj=Math.round(latest.p+(TARGET.p-latest.p)*Math.min(pR,1.2)*(remain/(remain+elapsed*0.3)));
    const uj=Math.round(latest.u+(TARGET.u-latest.u)*Math.min(uR,1.2)*(remain/(remain+elapsed*0.3)));
    return{tP,tU,aP,aU,pR,uR,pj,uj,pOk:pj>=80,uOk:uj>=20,latest,latestDate:sorted.length?sorted[sorted.length-1][0]:null};
  },[logs,tests,today]);

  const pctP=Math.min(100,(tl.p/plan.sets)*100),pctU=Math.min(100,(tl.u/plan.sets)*100);
  const fcOk=fc.pOk&&fc.uOk;
  const nextTest=TEST_SCHEDULE.find(t=>t.date>=today);

  const goals=useMemo(()=>{
    let totalDays=0,bodyDays=0,brainMax=0,brainEarned=0;
    const c=new Date(START);
    while(c<=now&&c<=END){
      const{rate}=getDayRate(ymd(c));
      const adjRd=Math.max(1,Math.round(3*rate));
      const adjLn=Math.max(1,Math.round(3*rate));
      const dayMax=1+1+2+adjRd+1+adjLn; // nf+yoga+med(항상2)+read+write+lang
      totalDays++;brainMax+=dayMax;
      const l=logs[ymd(c)];const mp=BASE_PLAN[c.getMonth()+1];
      if(l&&mp){
        const adjS=Math.max(1,Math.round(mp.sets*rate));
        if((l.p||0)>=Math.ceil(adjS*0.5)&&(l.u||0)>=Math.ceil(adjS*0.5)&&l.plank)bodyDays++;
        if(l.nf)brainEarned+=1;if(l.yoga)brainEarned+=1;
        brainEarned+=Math.min(l.med||0,2);
        brainEarned+=Math.min(l.read||0,adjRd);
        if(l.write)brainEarned+=1;
        brainEarned+=Math.min(l.lang||0,adjLn);
      }c.setDate(c.getDate()+1)}
    const bR=totalDays>0?bodyDays/totalDays:0;
    const brR=brainMax>0?brainEarned/brainMax:0;
    return{
      body:{rate:bR,ok:fcOk&&bR>=0.7,label:"푸시업80 풀업20",color:fcOk&&bR>=0.7?"#16a34a":"#dc2626"},
      brain:{rate:brR,ok:brR>=0.7,label:"전교1등 두뇌",color:brR>=0.7?"#16a34a":"#dc2626"},
      totalDays,brainEarned,brainMax};
  },[logs,fcOk]);

  return(
    <div style={S.app}>
      <div style={{padding:"10px 16px 6px",background:"linear-gradient(135deg,#e8f5e8,#f0f7f0)",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"#6b7c6b",fontSize:9,letterSpacing:"0.12em",fontWeight:800}}>TARGET · 2026.12.31</div>
          <div style={{color:"#2d5a27",fontSize:10,fontWeight:700}}>D-{daysLeft} · {realPlan.phase}</div>
        </div>
      </div>
      <div style={{flexShrink:0,background:"#f0f7f0"}}>
        <div style={{display:"flex",gap:6,padding:"8px 12px",background:"linear-gradient(135deg,#e8f5e8,#f0f7f0)",borderBottom:"1px solid rgba(0,0,0,0.03)"}}>
          {[goals.body,goals.brain].map((g,i)=>(
            <div key={i} style={{flex:1,borderRadius:10,padding:"8px 6px",border:`1.5px solid ${g.color}30`,background:g.ok?"rgba(22,163,74,0.08)":"rgba(220,38,38,0.06)",textAlign:"center"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                <span style={{fontSize:10,color:g.color,fontWeight:900}}>{g.ok?"✓":"✕"}</span>
                <span style={{fontSize:12,fontWeight:900,color:"#1a2e1a"}}>{g.label}</span>
              </div>
              <div style={{fontSize:15,fontWeight:900,color:g.color,fontFamily:"ui-monospace,monospace",marginTop:2}}>{Math.round(g.rate*100)}%</div>
            </div>))}
        </div>
        <div style={S.nav}>
          {[{id:"today",l:"기록",i:"⊕"},{id:"calendar",l:"캘린더",i:"▦"},{id:"month",l:"월간",i:"◈"},{id:"test",l:"테스트",i:"▲"}].map(t=>(
            <button key={t.id} onClick={()=>setView(t.id)} style={{...S.navBtn,...(view===t.id?S.navAct:{})}}>
              <span style={{fontSize:15,fontWeight:900}}>{t.i}</span>
              <span style={{fontSize:10,fontWeight:700}}>{t.l}</span>
            </button>))}
        </div>
      </div>
      <div style={S.content}>
        {view==="today"&&<RecordView {...{plan,tl,activeDate,isToday,pctP,pctU,mCum,realMonth,nextTest,today,tomorrow,now,goals,fc,logs}} onAdd={add} onSub={sub} onToggle={toggle} onAddCapped={addCapped} onSubField={subField} goDate={goDate} goToday={goToday}/>}
        {view==="calendar"&&<CalView logs={logs} tests={tests} calMonth={calMonth} setCalMonth={setCalMonth} today={today} onSelectDate={d=>{setActiveDate(d);setView("today")}}/>}
        {view==="month"&&<MonthView month={realMonth} tests={tests}/>}
        {view==="test"&&<TestView tests={tests} onSave={saveTest} fc={fc} today={today} now={now}/>}
      </div>
    </div>
  );
}

/*═══ 기록 탭 ═══*/
function RecordView({plan,tl,activeDate,isToday,pctP,pctU,mCum,realMonth,nextTest,today,tomorrow,now,goals,fc,logs,onAdd,onSub,onToggle,onAddCapped,onSubField,goDate,goToday}){
  const d=new Date(activeDate);const dow=dayNames[d.getDay()];
  const{rate:wkRate,label:wkLabel}=getDayRate(activeDate);
  const isReduced=wkRate<1;

  // 감량 조정 (명상은 제외)
  const adjSets=Math.max(1,Math.round(plan.sets*wkRate));
  const adjRead=Math.max(1,Math.round(3*wkRate));
  const adjLang=Math.max(1,Math.round(3*wkRate));
  const adjYoga=Math.max(5,Math.round(20*wkRate));
  const adjPctP=Math.min(100,(tl.p/adjSets)*100);
  const adjPctU=Math.min(100,(tl.u/adjSets)*100);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <button onClick={()=>goDate(-1)} style={S.dateNav}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:900,color:isToday?"#2d5a27":"#b45309"}}>{d.getMonth()+1}월 {d.getDate()}일 ({dow})</div>
          {!isToday&&activeDate!==tomorrow&&<div style={{display:"flex",justifyContent:"center",gap:8,marginTop:4}}>
            <span style={{color:"#b45309",fontSize:9,fontWeight:700}}>📝 과거 기록 수정 중</span>
            <button onClick={goToday} style={{color:"#2d5a27",fontSize:9,fontWeight:800,background:"rgba(22,163,74,0.1)",border:"1px solid rgba(22,163,74,0.3)",borderRadius:4,padding:"2px 8px",cursor:"pointer"}}>오늘로</button>
          </div>}
          {isToday&&<div style={{color:"#6b7c6b",fontSize:9,marginTop:2}}>오늘</div>}
          {activeDate===tomorrow&&<div style={{color:"#2563eb",fontSize:9,fontWeight:700,marginTop:2}}>📝 내일 것 미리 기록 중</div>}
        </div>
        <button onClick={()=>goDate(1)} style={{...S.dateNav,opacity:activeDate>=tomorrow?0.2:1}}>›</button>
      </div>

      {isReduced&&(
        <div style={{...S.card,padding:10,borderLeft:"4px solid #2563eb",background:"rgba(37,99,235,0.04)"}}>
          <div style={{color:"#2563eb",fontSize:11,fontWeight:800}}>🌿 {wkLabel} 강도</div>
          <div style={{color:"#6b7c6b",fontSize:9,marginTop:2}}>회복을 위해 훈련량 감소 (명상 제외) · 세트 {plan.sets}→{adjSets}</div>
        </div>
      )}

      {plan.adjusted&&plan.reason&&(
        <div style={{...S.card,padding:10,borderLeft:`4px solid ${plan.behind?"#d97706":"#16a34a"}`,background:plan.behind?"rgba(217,119,6,0.06)":"rgba(22,163,74,0.06)"}}>
          <div style={{color:plan.behind?"#b45309":"#16a34a",fontSize:10,fontWeight:800}}>{plan.behind?"⚙ 플랜 자동 조정됨":"✓ 테스트 통과"}</div>
          <div style={{color:"#6b7c6b",fontSize:9,marginTop:2}}>{plan.reason}</div>
        </div>
      )}

      {/*── 목표1: 몸 ──*/}
      <GoalHeader g={goals.body} detail={`예상 P${fc.pj}·U${fc.uj}`}/>
      <Ctr label="💪 푸시업" sub={`${plan.set.p}회 × ${adjSets}세트${isReduced?" ("+wkLabel+")":""}`} count={tl.p} target={adjSets} vol={tl.p*plan.set.p} pct={adjPctP} color="#2563eb" grad="linear-gradient(90deg,#2563eb,#0891b2)" onAdd={()=>onAdd("p")} onSub={()=>onSub("p")}/>
      <Ctr label="🏋️ 풀업" sub={`${plan.set.u}회 × ${adjSets}세트${isReduced?" ("+wkLabel+")":""}`} count={tl.u} target={adjSets} vol={tl.u*plan.set.u} pct={adjPctU} color="#7c3aed" grad="linear-gradient(90deg,#7c3aed,#db2777)" onAdd={()=>onAdd("u")} onSub={()=>onSub("u")}/>
      <Chk icon="💪" label="복근운동" sub="1회" done={tl.plank} color="#d97706" onToggle={()=>onToggle("plank")}/>

      {/*── 목표2: 두뇌 ──*/}
      <GoalHeader g={goals.brain} detail={`${goals.brainEarned}/${goals.brainMax}점`}/>
      <MiniCtr label="🧘 명상" sub="10분이상 × 2회" count={tl.med||0} max={2} color="#0891b2" onAdd={()=>onAddCapped("med",2)} onSub={()=>onSubField("med")}/>
      <MiniCtr label="📖 읽기" sub={`20분씩 × ${adjRead}회${isReduced?" ("+wkLabel+")":""}`} count={tl.read||0} max={adjRead} color="#0d9488" onAdd={()=>onAddCapped("read",adjRead)} onSub={()=>onSubField("read")}/>
      <Chk icon="✏️" label="쓰기" sub="20분" done={tl.write} color="#6366f1" onToggle={()=>onToggle("write")}/>
      <MiniCtr label="🗣️ 영어 말하기" sub={`20분씩 × ${adjLang}회${isReduced?" ("+wkLabel+")":""}`} count={tl.lang||0} max={adjLang} color="#2563eb" onAdd={()=>onAddCapped("lang",adjLang)} onSub={()=>onSubField("lang")}/>
      <Chk icon="🔖" label="N.F." sub="" done={tl.nf} color="#a855f7" onToggle={()=>onToggle("nf")}/>
      <Chk icon="🧘‍♀️" label="요가 / 스트레칭" sub={`${adjYoga}분${isReduced?" ("+wkLabel+")":""}`} done={tl.yoga} color="#16a34a" onToggle={()=>onToggle("yoga")}/>

      {/*월 누적*/}
      {isToday&&(
        <div style={{...S.card,background:"rgba(22,163,74,0.04)"}}>

          <div style={{color:"#6b7c6b",fontSize:10,marginTop:4}}>통과 기준: P{nextTest.target.p} · U{nextTest.target.u}</div>
        </div>
      )}
      {isToday&&nextTest&&nextTest.date!==today&&(

      )}
      <div style={{...S.info,textAlign:"center"}}><span style={{color:"#16a34a",fontWeight:700}}>GtG</span> 실패까지 가지 말 것 · 세트 간 15분+</div>
      <div style={{height:150}}/>
    </div>
  );
}

/*═══ 컴포넌트 ═══*/
function Ctr({label,sub,count,target,vol,pct,color,grad,onAdd,onSub}){
  const[pop,setPop]=useState(false);
  const h=()=>{onAdd();setPop(true);setTimeout(()=>setPop(false),200)};
  return(<div style={{...S.card,borderLeft:`4px solid ${color}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div><div style={{color,fontSize:14,fontWeight:800}}>{label}</div><div style={{color:"#6b7c6b",fontSize:10,marginTop:2}}>{sub}</div></div>
      <div style={{textAlign:"right"}}><div style={{fontSize:28,fontWeight:900,fontFamily:"ui-monospace,monospace",lineHeight:1,...(pop?{animation:"pop 0.2s ease-out"}:{})}}>{count}<span style={{fontSize:14,color:"#8a9b8a"}}>/{target}</span></div><div style={{color:"#6b7c6b",fontSize:10,marginTop:2}}>{vol}회</div></div>
    </div>
    <div style={{height:6,background:"rgba(0,0,0,0.06)",borderRadius:3,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${pct}%`,background:grad,borderRadius:3,transition:"width 0.3s"}}/></div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={onSub} style={{...S.btn,width:52,fontSize:20,color:"#6b7c6b"}}>−</button>
      <button onClick={h} style={{...S.btn,flex:1,background:color,color:"#fff",border:"none",fontWeight:800,fontSize:14}}>+ 세트 완료</button>
    </div>
  </div>);
}
function MiniCtr({label,sub,count,max,color,onAdd,onSub}){

    <div style={{height:5,background:"rgba(0,0,0,0.06)",borderRadius:3,overflow:"hidden",marginBottom:10}}><div style={{height:"100%",width:`${Math.min(100,(count/max)*100)}%`,background:color,borderRadius:3,transition:"width 0.3s"}}/></div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={onSub} style={{...S.btn,width:48,height:42,fontSize:18,color:"#6b7c6b"}}>−</button>
      <button onClick={onAdd} style={{...S.btn,flex:1,height:42,background:color,color:"#fff",border:"none",fontWeight:800,fontSize:13,opacity:count>=max?0.4:1}}>+ 완료</button>
    </div>

}
function Chk({icon,label,sub,done,color,onToggle}){
  return(<div onClick={onToggle} style={{...S.card,padding:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer",borderLeft:`4px solid ${done?color:"rgba(0,0,0,0.08)"}`}}>

}
function GoalHeader({g,detail}){
  return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0 3px",borderBottom:`2px solid ${g.color}20`,marginTop:6}}>

function MBar({label,val,max,color}){
  const pct=max>0?Math.min(100,(val/max)*100):0;

  </div>);
}

/*═══ 캘린더 ═══*/
function CalView({logs,tests,calMonth,setCalMonth,today,onSelectDate}){
  const year=calMonth.getFullYear(),mo=calMonth.getMonth();
  const firstDay=new Date(year,mo,1).getDay();const dim=new Date(year,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push({d:new Date(year,mo,-(firstDay-1-i)),out:true});
  for(let i=1;i<=dim;i++)cells.push({d:new Date(year,mo,i),out:false});
  while(cells.length%7)cells.push({d:new Date(year,mo+1,cells.length-firstDay-dim+1),out:true});
  const canP=new Date(year,mo,1)>=new Date(2026,3,1),canN=new Date(year,mo,1)<=new Date(2026,11,1);
  const mPlan=getActivePlan(mo+1,tests);
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <button onClick={()=>canP&&setCalMonth(new Date(year,mo-1,1))} style={{...S.calN,opacity:canP?1:.25}}>‹</button>
      <div style={{flex:1,textAlign:"center",fontSize:16,fontWeight:800}}>{year}년 {mo+1}월</div>
      <button onClick={()=>canN&&setCalMonth(new Date(year,mo+1,1))} style={{...S.calN,opacity:canN?1:.25}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {["일","월","화","수","목","금","토"].map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:10,fontWeight:800,padding:"6px 0",color:i===0?"#dc2626":"#6b7c6b"}}>{d}</div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {cells.map((c,i)=>{
        const ds=ymd(c.d);const isT=ds===today;const log=logs[ds];
        const inR=c.d>=START&&c.d<=END&&!c.out;const sun=c.d.getDay()===0;const sat=c.d.getDay()===6;const hol=isHoliday(ds);const canTap=inR&&ds<=ymd(addDays(new Date(today),1));
        let pD=0,uD=0,hasBrain=false;
        if(log){pD=log.p||0;uD=log.u||0;hasBrain=!!(log.med||log.nf||log.yoga||log.read||log.write||log.lang)}
        const hasSome=pD>0||uD>0||hasBrain;
        const isTest=TEST_SCHEDULE.some(t=>t.date===ds);
        return(<div key={i} onClick={()=>canTap&&onSelectDate(ds)}
          style={{minHeight:48,padding:3,borderRadius:6,cursor:canTap?"pointer":"default",
            background:isT?"rgba(22,163,74,0.12)":hol?"rgba(220,38,38,0.04)":"#fff",border:isT?"1.5px solid rgba(22,163,74,0.5)":"1px solid rgba(0,0,0,0.06)",opacity:c.out?0.25:1}}>
          <div style={{fontSize:10,fontWeight:isT?900:600,color:isT?"#16a34a":sun?"#dc2626":hol?"#dc2626":"#1a2e1a",fontFamily:"ui-monospace,monospace",marginBottom:1}}>
            {c.d.getDate()}{isTest&&<span style={{color:"#d97706"}}>★</span>}{hol&&!sun&&<span style={{color:"#dc2626",fontSize:7}}>🔴</span>}
          </div>
          {inR&&hasSome&&(<div style={{display:"flex",flexDirection:"column",gap:1}}>
            {pD>0&&<div style={{fontSize:7,color:"#2563eb",fontWeight:700,background:"rgba(37,99,235,0.08)",borderRadius:2,padding:"0 2px"}}>P{pD}</div>}
            {uD>0&&<div style={{fontSize:7,color:"#7c3aed",fontWeight:700,background:"rgba(124,58,237,0.08)",borderRadius:2,padding:"0 2px"}}>U{uD}</div>}
            {hasBrain&&<div style={{fontSize:7,color:"#16a34a"}}>📚</div>}
          </div>)}
          {inR&&!hasSome&&(sat||sun||hol)&&<div style={{fontSize:7,color:"#2563eb"}}>{sat?"25%":"50%"}</div>}
        </div>);
      })}
    </div>
    <div style={{...S.info,padding:10}}>
      <div style={{color:"#6b7c6b",fontSize:9,marginBottom:4}}>📅 과거 날짜 탭 → 기록 수정</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,fontSize:9}}>
        <div><span style={{color:"#2563eb"}}>■</span> 푸시업</div>
        <div><span style={{color:"#7c3aed"}}>■</span> 풀업</div>
        <div><span style={{color:"#d97706"}}>★</span> 테스트</div>
      </div>
    </div>
  </div>);
}

/*═══ 월간 ═══*/
function MonthView({month,tests}){
  return(<div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{color:"#6b7c6b",fontSize:9,fontWeight:800,letterSpacing:"0.08em"}}>9개월 플랜 · 맥스 테스트 자동 조정</div>
    {Object.entries(BASE_PLAN).map(([m])=>{
      const mi=parseInt(m);const cur=mi===month;const past=mi<month;
      const active=getActivePlan(mi,tests);const base=BASE_PLAN[mi];
      const td=Math.round(base.days*6/7);
      const changed=active.adjusted&&(active.set.p!==base.set.p||active.set.u!==base.set.u||active.sets!==base.sets);
      return(<div key={m} style={{...S.card,padding:11,opacity:past?0.5:1,border:cur?"1.5px solid rgba(22,163,74,0.5)":changed?"1.5px solid rgba(217,119,6,0.3)":"1px solid rgba(0,0,0,0.06)",background:cur?"rgba(22,163,74,0.06)":"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
          <div>
            <div style={{fontSize:13,fontWeight:800}}>{m}월 <span style={{color:"#6b7c6b",fontSize:10}}>{base.phase}</span>{mi===4?" (18~30)":""}
              {changed&&<span style={{color:"#d97706",fontSize:8,marginLeft:4}}>⚙</span>}
            </div>
            <div style={{color:"#6b7c6b",fontSize:10,marginTop:3}}>
              P{active.set.p}×{active.sets} · U{active.set.u}×{active.sets} · 복근
            </div>
          </div>
          <div style={{textAlign:"right",fontSize:10}}>
            <div style={{color:"#2563eb",fontWeight:700}}>1RM P{base.max.p}·U{base.max.u}</div>
          </div>
        </div>
      </div>);
    })}
  </div>);
}

/*═══ 테스트 ═══*/

        <div><div style={{fontSize:10,color:"#6b7c6b"}}>풀업</div><div style={{fontSize:28,fontWeight:900,color:fc.uOk?"#16a34a":"#dc2626",fontFamily:"ui-monospace,monospace"}}>{fc.uj}<span style={{fontSize:12,color:"#8a9b8a"}}>/20</span></div></div>
      </div>
      {fc.latestDate&&<div style={{color:"#6b7c6b",fontSize:9,marginTop:6}}>최근 실측: {fc.latestDate} · P{fc.latest.p} U{fc.latest.u}</div>}
    </div>
    <div style={S.card}>
      <div style={{color:"#6b7c6b",fontSize:9,fontWeight:800,marginBottom:10}}>누적 볼륨 달성률</div>

            <span style={{color:"#6b7c6b"}}>{x.l}</span>
            <span style={{fontFamily:"ui-monospace,monospace"}}>{x.a.toLocaleString()}/{x.t.toLocaleString()} ({Math.round(x.r*100)}%)</span>

          <div style={{height:6,background:"rgba(0,0,0,0.06)",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(100,x.r*100)}%`,background:x.r>=1?"#16a34a":x.r>=0.8?"#d97706":"#dc2626",borderRadius:3}}/>

    </div>
    <div style={S.card}>

      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input type="number" placeholder="푸시업" value={ip} onChange={e=>setIp(e.target.value)} style={S.inp}/>
        <input type="number" placeholder="풀업" value={iu} onChange={e=>setIu(e.target.value)} style={S.inp}/>

      {saved?<div style={{textAlign:"center",padding:14,color:"#16a34a",fontSize:14,fontWeight:800}}>✓ 저장!</div>:

    <div style={S.card}>
      <div style={{color:"#6b7c6b",fontSize:9,fontWeight:800,marginBottom:8}}>테스트 스케줄</div>

        const r=tests[t.date];const isP=t.date<today;const isT=t.date===today;

    <div style={{height:150}}/>
  </div>);
}
